<!doctype html>
<html>
  <head>
    <title>ESCAPE</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        cursor: none !important;
      }

      html,
      body {
        font-family: "Inter", sans-serif;
        background: #000;
        cursor: none;
        overflow: hidden;
      }

      #hero {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 16px;
        pointer-events: none;
      }

      h1 {
        font-size: 48px;
        font-weight: 300;
        letter-spacing: 6px;
        text-transform: uppercase;
        opacity: 0.5;
        color: #000;
      }

      .cursor-wrapper {
        /*display: none;*/
        position: absolute;
        pointer-events: none;
        top: 0;
        left: 0;
        transform-origin: center;
        z-index: 2000;
        /*transition: all 200ms ease-in-out;*/
      }

      /* Collision wiggle animation */
      @keyframes wiggle {
        0% {
          transform: scale(1) rotate(0deg);
        }

        15% {
          transform: scale(1.4) rotate(-6deg);
        }

        30% {
          transform: scale(0.9) rotate(6deg);
        }

        45% {
          transform: scale(1.25) rotate(-4deg);
        }

        60% {
          transform: scale(0.95) rotate(3deg);
        }

        75% {
          transform: scale(1.1) rotate(-2deg);
        }

        100% {
          transform: scale(1) rotate(0deg);
        }
      }

      .wiggle {
        animation: wiggle 0.45s ease forwards;
      }

      #average-cursor {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        position: absolute;
        background-color: fuchsia;
        transform: translate(-50%, -50%);
        z-index: 3000;
      }

      #trigger-point {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        position: absolute;
        background-color: lime;
        transform: translate(-50%, -50%);
        z-index: 3;
        top: 80%;
        left: 70%;
      }

      /* Cursor styles */
      .cursor-circle {
        opacity: 30%;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background-color: yellow;
        transform: translate(-50%, -50%);
        transition:
          width 200ms ease-out,
          height 200ms ease-out;
      }

      /* Active/inactive state classes */
      .active-state .cursor-circle {
        background-color: orange !important;
      }

      /* Touch cursor styles */
      .touch-cursor {
        z-index: 5 !important;
        pointer-events: none;
      }

      .own-cursor.touch-active .cursor-circle {
        width: 200px;
        height: 200px;
      }

      /* Mobile-specific styles */
      @media (hover: none) and (pointer: coarse) {
        body {
          cursor: none !important;
        }
      }
    </style>
  </head>

  <body>
    <div id="hero"></div>

    <div id="average-cursor"></div>
    <div id="trigger-point"></div>

    <script src="/socket.io/socket.io.js"></script>

    <script>
      const socket = io();
      const soundFiles = ["sound1.mp3", "sound2.mp3", "sound3.mp3"];
      const collisionPoolSize = 4;
      const soundPools = soundFiles.map((file) => {
        const src = `sound/${file}`;
        return Array.from({ length: collisionPoolSize }, () => {
          const audio = new Audio(src);
          audio.preload = "auto";
          return audio;
        });
      });
      const backgroundMusic = new Audio();
      const allCursors = {};
      const averagePos = { x: 0, y: 0 };

      // My own identity (received from server)
      let myColor = null;
      let myBaseFreq = 220;
      let myBackgroundTrack = null;
      let myCursorEl = null;

      // Trigger point state for host version
      let triggerCatchCount = 0;
      const MAX_TRIGGER_CATCHES = 5;
      let triggerPointEl = document.getElementById("trigger-point");

      let averageCursorEl = document.getElementById("average-cursor");

      let myCursorLocal = {
        x: 0,
        y: 0,
        isTouching: false,
        isActive: false,
      };

      let activeTouchId = null;

      let lastUpdateTime = 0;
      let animationFrameId = null;

      let isMouseDown = false;

      // Audio
      let audioCtx = null;
      let myOsc = null;
      let myGain = null;
      let audioReady = false;

      // Throttle
      let lastEmit = 0;
      const collisionCooldownMs = 300;
      const collisionHitboxSize = 18;
      const collisionPadding = 10;
      const lastHitOfCursor = {};

      // ─── Receive own identity from server ───────────────────────────
      socket.on("welcome", (data) => {
        myColor = data.color;
        myBaseFreq = data.freq;
        myBackgroundTrack = data.backgroundTrack;
        const isHost = data.isHost || false;

        // if (myBackgroundTrack) {
        //   backgroundMusic.src = `sound/${myBackgroundTrack}`;
        //   backgroundMusic.preload = "auto";
        //   backgroundMusic.load();
        // }

        // Host version doesn't render self-cursor or broadcast movements
        if (!isHost && !myCursorEl) {
          // myCursorEl = createCursorElement(myColor, false);
          // myCursorEl.classList.add("own-cursor");

          // Initialize at center position (50%)
          updateMyCursorPosition(window.innerWidth / 2, window.innerHeight / 2);
        }
      });

      // ─── Game Loop ──────────────────────────────────────────────────
      function gameLoop(timestamp) {
        const deltaTime = timestamp - lastUpdateTime;
        lastUpdateTime = timestamp;

        // Calculate average position
        calculateAverage();
        // console.log(allCursors);
        // Check for collisions
        checkCollision();

        // Check if average position collides with trigger point
        checkTriggerCollision();

        // Continue the loop
        animationFrameId = requestAnimationFrame(gameLoop);
      }

      // Start the game loop
      lastUpdateTime = performance.now();
      animationFrameId = requestAnimationFrame(gameLoop);

      // ─── Audio helpers ───────────────────────────────────────────────
      function modulateFreq(baseFreq, x, y) {
        return baseFreq;
      }

      window.addEventListener("click", () => {
        if (audioReady) return;
        // 激活 AudioContext 並預載所有音效
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioReady = true;

        if (myBackgroundTrack) {
          backgroundMusic.loop = true;
          backgroundMusic.volume = 0.25;
          backgroundMusic
            .play()
            .catch((e) => console.error("背景音樂播放失敗:", e));
        }
        soundPools.flat().forEach((sound) => {
          sound.currentTime = 0;
          sound.load();
        });

        const instructions = document.getElementById("instructions");
        if (instructions)
          instructions.innerText = "Sound enabled! Go bump into someone!";
      });

      // ─── Collision effect ─────────────────────────────────────────────
      function triggerCollision(cursor) {
        // 1. 視覺效果：保持原本的 Wiggle 動畫
        if (!cursor?.el) return;
        cursor.el.classList.remove("wiggle");
        void cursor.el.offsetWidth;
        cursor.el.classList.add("wiggle");
        cursor.el.addEventListener(
          "animationend",
          () => {
            cursor.el.classList.remove("wiggle");
          },
          { once: true },
        );

        // 2. 隨機播放 MP3 音效
        if (audioReady && soundPools.length > 0) {
          // 從預載好的 pool 中挑一個可立即播放的音效實例，降低碰撞延遲
          const randomIndex = Math.floor(Math.random() * soundPools.length);
          const selectedPool = soundPools[randomIndex];
          const soundInstance =
            selectedPool.find((sound) => sound.paused || sound.ended) ||
            selectedPool[0];

          soundInstance.pause();
          soundInstance.currentTime = 0;
          soundInstance.volume = 0.6;
          soundInstance.play().catch((e) => console.error("音效播放失敗:", e));
        }
      }

      // ─── Build cursor DOM element ─────────────────────────────────────
      function createCursorElement(color, isTouch) {
        const cursor = document.createElement("div");
        cursor.classList.add("cursor-wrapper");
        if (isTouch) cursor.classList.add("touch-cursor");

        // Create a simple yellow circle (20px diameter)
        const circle = document.createElement("div");
        circle.classList.add("cursor-circle");

        cursor.appendChild(circle);
        document.body.appendChild(cursor);

        return cursor;
      }

      function isCollidingWithCursor(pointX, pointY, cursor) {
        if (!cursor?.el) return false;
        const cursorXAbs = (cursor.x / 100) * window.innerWidth;
        const cursorYAbs = (cursor.y / 100) * window.innerHeight;

        const left = cursorXAbs - collisionPadding;
        const top = cursorYAbs - collisionPadding;
        const right = cursorXAbs + cursor.el.offsetWidth + collisionPadding;
        const bottom = cursorYAbs + cursor.el.offsetHeight + collisionPadding;

        const halfHitbox = collisionHitboxSize / 2;
        const pointLeft = pointX - halfHitbox;
        const pointTop = pointY - halfHitbox;
        const pointRight = pointX + halfHitbox;
        const pointBottom = pointY + halfHitbox;

        return (
          pointLeft < right &&
          pointRight > left &&
          pointTop < bottom &&
          pointBottom > top
        );
      }

      function emitMyCursorState() {
        const now = Date.now();
        if (now - lastEmit < 16) return;
        lastEmit = now;

        socket.emit("cursor-move", {
          x: myCursorLocal.x,
          y: myCursorLocal.y,
          isTouching: myCursorLocal.isTouching,
          isActive: myCursorLocal.isActive,
        });
      }

      function updateMyCursorPosition(x, y) {
        // Convert absolute positions to percentages
        const screenWidth = window.innerWidth;
        const screenHeight = window.innerHeight;
        const xPercent = (x / screenWidth) * 100;
        const yPercent = (y / screenHeight) * 100;

        myCursorLocal.x = xPercent;
        myCursorLocal.y = yPercent;
        emitMyCursorState();
        myCursorEl.style.left = x + "px";
        myCursorEl.style.top = y + "px";

        // Modulate my own sound with position
        if (audioCtx && myOsc) {
          const modFreq = modulateFreq(
            myBaseFreq,
            myCursorLocal.x,
            myCursorLocal.y,
          );
          myOsc.frequency.setTargetAtTime(modFreq, audioCtx.currentTime, 0.08);
        }
      }

      // ─── Mouse tracking ───────────────────────────────────────────────
      // ─── Host version doesn't handle mouse/touch input ────────────
      // Host only displays other cursors and manages trigger point
      // All input handling removed for host version

      // ─── Receive other cursors ────────────────────────────────────────
      socket.on("cursor-update", (data) => {
        // console.log(
        //   "Received cursor update with touch state:",
        //   data.isTouching,
        // );

        // First time seeing this user
        if (!allCursors[data.id]) {
          const el = createCursorElement(data.color, data.isTouching);
          const entry = {
            el,
            x: 0,
            y: 0,
            baseFreq: data.freq,
            osc: null,
            gain: null,
            isTouching: false,
            isActive: false,
          };

          allCursors[data.id] = entry;
        }

        const c = allCursors[data.id];

        // Convert percentage positions back to absolute positions
        const screenWidth = window.innerWidth;
        const screenHeight = window.innerHeight;
        c.x = data.x;
        c.y = data.y;
        cAbsX = (data.x / 100) * screenWidth;
        cAbsY = (data.y / 100) * screenHeight;
        c.isTouching = data.isTouching || false;
        c.isActive = data.isActive || false;
        c.el.style.left = cAbsX + "px";
        c.el.style.top = cAbsY + "px";

        // Update cursor classes based on active state
        const circle = c.el.querySelector(".cursor-circle");
        if (circle) {
          if (c.isActive || c.isTouching) {
            c.el.classList.add("active-state");
          } else {
            c.el.classList.remove("active-state");
          }
        }

        // Add visual indicator for touch state
        if (c.isTouching) {
          c.el.classList.add("touch-active");
          c.el.style.display = "block";
        } else {
          c.el.classList.remove("touch-active");
        }

        // Modulate their sound with their position
        if (audioCtx && c.osc) {
          const modFreq = modulateFreq(c.baseFreq, c.x, c.y);
          c.osc.frequency.setTargetAtTime(modFreq, audioCtx.currentTime, 0.08);
        }
      });

      function calculateAverage() {
        // Convert our own percentage position to absolute for calculation
        const screenWidth = window.innerWidth;
        const screenHeight = window.innerHeight;

        let xSum = 0;
        let ySum = 0;
        let activeCursorCount = 0; // Start with 1 for our own cursor

        for (const id in allCursors) {
          const cursor = allCursors[id];
          // Only include cursors that are actively touching (for touch devices)
          // or always include non-touch cursors
          if (
            !cursor.el.classList.contains("touch-cursor") ||
            cursor.isTouching
          ) {
            xSum += (cursor.x / 100) * screenWidth;
            ySum += (cursor.y / 100) * screenHeight;
            activeCursorCount++;
          }
        }

        if (activeCursorCount > 0) {
          averagePos.x = xSum / activeCursorCount;
          averagePos.y = ySum / activeCursorCount;
          averageCursorEl.style.left = averagePos.x + "px";
          averageCursorEl.style.top = averagePos.y + "px";
        }
      }

      // ─── Collision detection ──────────────────────────────────────────
      function checkCollision() {
        const now = Date.now();

        // Convert our own percentage position to absolute for collision detection
        const screenWidth = window.innerWidth;
        const screenHeight = window.innerHeight;

        for (const id in allCursors) {
          const lastHit = lastHitOfCursor[id] || 0;
          if (now - lastHit < collisionCooldownMs) continue;
          const cursor = allCursors[id];
          const cursorXAbs = (cursor.x / 100) * screenWidth;
          const cursorYAbs = (cursor.y / 100) * screenHeight;
          for (const otherId in allCursors) {
            const other = allCursors[otherId];
            if (id === otherId) continue;
            const lastHit = lastHitOfCursor[otherId] || 0;
            if (now - lastHit < collisionCooldownMs) continue;
            if (isCollidingWithCursor(cursorXAbs, cursorYAbs, other)) {
              lastHitOfCursor[id] = now;
              lastHitOfCursor[otherId] = now;
              triggerCollision(cursor);
              triggerCollision(other);
            }
          }
        }
      }

      // ─── Check trigger collision ──────────────────────────────────────
      function checkTriggerCollision() {
        if (!triggerPointEl || !averagePos) return;

        // Get trigger point position and dimensions
        const triggerRect = triggerPointEl.getBoundingClientRect();
        const triggerX = triggerRect.left + triggerRect.width / 2;
        const triggerY = triggerRect.top + triggerRect.height / 2;
        const triggerRadius = triggerRect.width / 2;

        // Calculate distance between average position and trigger point
        const dx = averagePos.x - triggerX;
        const dy = averagePos.y - triggerY;
        const distance = Math.sqrt(dx * dx + dy * dy);

        // Check if average position is within trigger point radius
        const collisionThreshold = triggerRadius + 10; // Add some padding
        if (distance < collisionThreshold) {
          triggerPointCollision();
        }
      }

      function triggerPointCollision() {
        console.log("Average position collided with trigger point!");

        // Increment catch counter
        triggerCatchCount++;
        console.log(
          `Trigger caught ${triggerCatchCount}/${MAX_TRIGGER_CATCHES} times`,
        );

        // Play collision sound
        if (audioReady && soundPools.length > 0) {
          const randomIndex = Math.floor(Math.random() * soundPools.length);
          const selectedPool = soundPools[randomIndex];
          const soundInstance = selectedPool[0];

          soundInstance.pause();
          soundInstance.currentTime = 0;
          soundInstance.volume = 0.8;
          soundInstance
            .play()
            .catch((e) => console.error("Trigger sound playback failed:", e));
        }

        // Check if we've reached the maximum catches
        if (triggerCatchCount >= MAX_TRIGGER_CATCHES) {
          console.log("Maximum trigger catches reached! Hiding trigger point.");
          if (triggerPointEl) {
            triggerPointEl.style.display = "none";
          }
          return; // Don't move to new position
        }

        // Move trigger point to a new random position after collision
        moveTriggerPointToRandomPosition();
      }

      function moveTriggerPointToRandomPosition() {
        // Get screen dimensions
        const screenWidth = window.innerWidth;
        const screenHeight = window.innerHeight;

        // Ensure trigger point stays within visible area with some margin
        const margin = 200;
        const minX = margin;
        const minY = margin;
        const maxX = screenWidth - margin;
        const maxY = screenHeight - margin;

        // Generate random position within bounds
        const randomX = Math.floor(Math.random() * (maxX - minX)) + minX;
        const randomY = Math.floor(Math.random() * (maxY - minY)) + minY;

        // Convert to percentage for consistent positioning across screen sizes
        const xPercent = (randomX / screenWidth) * 100;
        const yPercent = (randomY / screenHeight) * 100;

        console.log(
          `Moving trigger point to: (${xPercent.toFixed(1)}%, ${yPercent.toFixed(1)}%)`,
        );

        // Apply the new position immediately (no animations as requested)
        triggerPointEl.style.left = xPercent + "%";
        triggerPointEl.style.top = yPercent + "%";
      }

      // ─── User leaves ──────────────────────────────────────────────────
      socket.on("user-left", (id) => {
        if (allCursors[id]) {
          // Fade out their sound before removing
          if (audioCtx && allCursors[id].gain) {
            const g = allCursors[id].gain;
            g.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
            // Stop oscillator after fade
            setTimeout(() => {
              try {
                allCursors[id].osc.stop();
              } catch (e) {}
            }, 500);
          }
          allCursors[id].el.remove();
          delete allCursors[id];
          delete lastHitOfCursor[id];
        }
      });

      // Cleanup on page unload
      window.addEventListener("beforeunload", () => {
        if (animationFrameId) {
          cancelAnimationFrame(animationFrameId);
        }
      });
    </script>
  </body>
</html>
