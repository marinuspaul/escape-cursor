<!doctype html>
<html>

<head>
  <title>Cursor Party</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      cursor: none !important;
    }

    html,
    body {
      font-family: "Inter", sans-serif;
      background: #a1cd6b;
      cursor: none;
    }

    #hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
      pointer-events: none;
    }

    h1 {
      font-size: 48px;
      font-weight: 300;
      letter-spacing: 6px;
      text-transform: uppercase;
      opacity: 0.5;
      color: #000;
    }

    #instructions {
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 1px;
      opacity: 0.5;
      color: #000;
    }

    .cursor-wrapper {
      position: absolute;
      pointer-events: none;
      top: 0;
      left: 0;
      transform-origin: top left;
      z-index: 2000;
    }

    .cursor-wrapper svg {
      display: block;
    }

    .cursor-label {
      margin-top: 2px;
      margin-left: 4px;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.3px;
      white-space: nowrap;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgb(255, 255, 255, 1);
      display: inline-block;
    }

    /* Collision wiggle animation */
    @keyframes wiggle {
      0% {
        transform: scale(1) rotate(0deg);
      }

      15% {
        transform: scale(1.4) rotate(-6deg);
      }

      30% {
        transform: scale(0.9) rotate(6deg);
      }

      45% {
        transform: scale(1.25) rotate(-4deg);
      }

      60% {
        transform: scale(0.95) rotate(3deg);
      }

      75% {
        transform: scale(1.1) rotate(-2deg);
      }

      100% {
        transform: scale(1) rotate(0deg);
      }
    }

    .wiggle {
      animation: wiggle 0.45s ease forwards;
    }
  </style>
</head>

<body>
  <div id="hero">
    <h1 id="level-title">Cursor Party</h1>
    <p id="level-instructions">
      Click anywhere to enable sound — then go bump into someone!
    </p>
  </div>

  <img id="bouncingImage" src="./image/dvd.png"
    style="position: absolute; width: 290px; z-index: 1000; opacity: 0; display: none;" />

  <script src="/socket.io/socket.io.js"></script>

  <script>
    const socket = io();
    const soundFiles = ['sound1.mp3', 'sound2.mp3', 'sound3.mp3'];
    const collisionPoolSize = 4;
    const soundPools = soundFiles.map((file) => {
      const src = `sound/${file}`;
      return Array.from({ length: collisionPoolSize }, () => {
        const audio = new Audio(src);
        audio.preload = "auto";
        return audio;
      });
    });
    const backgroundMusic = new Audio();
    const otherCursors = {};
    const myPosition = { x: 0, y: 0 };

    // My own identity (received from server)
    let myColor = null;
    let myName = null;
    let myBaseFreq = 220;
    let myBackgroundTrack = null;
    let myCursorEl = null;

    // Audio
    let audioCtx = null;
    let myOsc = null;
    let myGain = null;
    let audioReady = false;

    // Throttle
    let lastEmit = 0;
    const collisionCooldownMs = 300;
    const collisionHitboxSize = 18;
    const collisionPadding = 10;
    const lastHitByCursor = {};

    // ─── Receive own identity from server ───────────────────────────
    socket.on("welcome", (data) => {
      myColor = data.color;
      myName = data.name;
      myBaseFreq = data.freq;
      myBackgroundTrack = data.backgroundTrack;

      if (myBackgroundTrack) {
        backgroundMusic.src = `sound/${myBackgroundTrack}`;
        backgroundMusic.preload = "auto";
        backgroundMusic.load();
      }

      if (!myCursorEl) {
        myCursorEl = createCursorElement(myColor, myName);
      }

      updateMyCursorPosition();
    });

    // ─── Receive level updates ──────────────────────────────────────
    socket.on("level-update", (levelData) => {
      document.getElementById('level-title').textContent = levelData.title;
      document.getElementById('level-instructions').textContent = levelData.instructions;
    });

    // ─── Audio helpers ───────────────────────────────────────────────
    function modulateFreq(baseFreq, x, y) {
      return baseFreq;
    }

    function createOscillator(freq) {
      return null;
    }

    window.addEventListener("click", () => {
      if (audioReady) return;
      // Activate AudioContext and preload all sound effects
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioReady = true;

      if (myBackgroundTrack) {
        backgroundMusic.loop = true;
        backgroundMusic.volume = 0.25;
        backgroundMusic.play().catch(e => console.error("Background music playback failed:", e));
      }
      soundPools.flat().forEach((sound) => {
        sound.currentTime = 0;
        sound.load();
      });

      const instructions = document.getElementById("instructions");
      if (instructions) instructions.innerText = "Sound enabled! Go bump into someone!";
    });

    // ─── Collision effect ─────────────────────────────────────────────
    function triggerCollision(cursor) {
      // 1. Visual effect: Keep the original Wiggle animation
      if (!cursor?.el) return;
      cursor.el.classList.remove("wiggle");
      void cursor.el.offsetWidth;
      cursor.el.classList.add("wiggle");
      cursor.el.addEventListener(
        "animationend",
        () => {
          cursor.el.classList.remove("wiggle");
        },
        { once: true },
      );

      // 2. Play random MP3 sound effect
      if (audioReady && soundPools.length > 0) {
        // Pick a ready-to-play sound instance from the pool to reduce collision delay
        const randomIndex = Math.floor(Math.random() * soundPools.length);
        const selectedPool = soundPools[randomIndex];
        const soundInstance =
          selectedPool.find((sound) => sound.paused || sound.ended) || selectedPool[0];

        soundInstance.pause();
        soundInstance.currentTime = 0;
        soundInstance.volume = 0.6;
        soundInstance.play().catch(e => console.error("Sound playback failed:", e));
      }
    }

    // ─── Build cursor DOM element ─────────────────────────────────────
    function createCursorElement(color, name) {
      const wrapper = document.createElement("div");
      wrapper.classList.add("cursor-wrapper");

      const svg = document.createElementNS(
        "http://www.w3.org/2000/svg",
        "svg",
      );
      svg.setAttribute("viewBox", "0 0 24 24");
      svg.setAttribute("width", "24");
      svg.setAttribute("height", "24");

      const path = document.createElementNS(
        "http://www.w3.org/2000/svg",
        "path",
      );
      path.setAttribute(
        "d",
        "M4 2 L4 18 L8 14 L12 22 L14 21 L10 13 L16 13 Z",
      );
      path.setAttribute("fill", color);
      path.setAttribute("stroke", "white");
      path.setAttribute("stroke-width", "1.2");
      path.setAttribute("stroke-linejoin", "round");
      svg.appendChild(path);

      const label = document.createElement("span");
      label.classList.add("cursor-label");
      label.style.color = color;
      label.innerText = name;

      wrapper.appendChild(svg);
      wrapper.appendChild(label);
      document.body.appendChild(wrapper);

      return wrapper;
    }

    function updateMyCursorPosition() {
      if (!myCursorEl) return;
      myCursorEl.style.left = myPosition.x + "px";
      myCursorEl.style.top = myPosition.y + "px";
    }

    function isCollidingWithCursor(pointX, pointY, cursor) {
      if (!cursor?.el) return false;

      const left = cursor.x - collisionPadding;
      const top = cursor.y - collisionPadding;
      const right = cursor.x + cursor.el.offsetWidth + collisionPadding;
      const bottom = cursor.y + cursor.el.offsetHeight + collisionPadding;

      const halfHitbox = collisionHitboxSize / 2;
      const pointLeft = pointX - halfHitbox;
      const pointTop = pointY - halfHitbox;
      const pointRight = pointX + halfHitbox;
      const pointBottom = pointY + halfHitbox;

      return (
        pointLeft < right &&
        pointRight > left &&
        pointTop < bottom &&
        pointBottom > top
      );
    }

    // ─── Mouse tracking ───────────────────────────────────────────────
    window.addEventListener("mousemove", (e) => {
      const now = Date.now();
      if (now - lastEmit < 16) return;
      lastEmit = now;

      myPosition.x = e.clientX + window.scrollX;
      myPosition.y = e.clientY + window.scrollY;
      updateMyCursorPosition();

      socket.emit("cursor-move", { x: myPosition.x, y: myPosition.y });

      // Modulate my own sound with position
      if (audioCtx && myOsc) {
        const modFreq = modulateFreq(myBaseFreq, myPosition.x, myPosition.y);
        myOsc.frequency.setTargetAtTime(modFreq, audioCtx.currentTime, 0.08);
      }

      checkCollision();
    });

    // ─── Receive other cursors ────────────────────────────────────────
    socket.on("cursor-update", (data) => {
      // First time seeing this user
      if (!otherCursors[data.id]) {
        const el = createCursorElement(data.color, data.name);
        const entry = {
          el,
          x: 0,
          y: 0,
          baseFreq: data.freq,
          osc: null,
          gain: null,
        };

        // Only create oscillator if audio is already running
        if (audioReady) {
          const audio = createOscillator(data.freq);
          entry.osc = audio.osc;
          entry.gain = audio.gain;
        }

        otherCursors[data.id] = entry;
      }

      const c = otherCursors[data.id];
      c.x = data.x;
      c.y = data.y;
      c.el.style.left = c.x + "px";
      c.el.style.top = c.y + "px";

      // Modulate their sound with their position
      if (audioCtx && c.osc) {
        const modFreq = modulateFreq(c.baseFreq, data.x, data.y);
        c.osc.frequency.setTargetAtTime(modFreq, audioCtx.currentTime, 0.08);
      }

      checkCollision();
    });

    // ─── Collision detection ──────────────────────────────────────────
    function checkCollision() {
      const now = Date.now();

      for (const id in otherCursors) {
        const other = otherCursors[id];
        const lastHit = lastHitByCursor[id] || 0;
        if (now - lastHit < collisionCooldownMs) continue;

        if (isCollidingWithCursor(myPosition.x, myPosition.y, other)) {
          lastHitByCursor[id] = now;
          triggerCollision({ el: myCursorEl });
          triggerCollision(other);
        }
      }
    }

    // ─── User leaves ──────────────────────────────────────────────────
    socket.on("user-left", (id) => {
      if (otherCursors[id]) {
        // Fade out their sound before removing
        if (audioCtx && otherCursors[id].gain) {
          const g = otherCursors[id].gain;
          g.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
          // Stop oscillator after fade
          setTimeout(() => {
            try {
              otherCursors[id].osc.stop();
            } catch (e) { }
          }, 500);
        }
        otherCursors[id].el.remove();
        delete otherCursors[id];
        delete lastHitByCursor[id];
      }
    });
  </script>



</body>

</html>
