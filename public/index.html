<!doctype html>
<html>
  <head>
    <title>ESCAPE</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        cursor: none !important;
      }

      html,
      body {
        font-family: "Inter", sans-serif;
        background: #000;
        cursor: none;
        overflow: hidden;
      }

      #hero {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 16px;
        pointer-events: none;
      }

      h1 {
        font-size: 48px;
        font-weight: 300;
        letter-spacing: 6px;
        text-transform: uppercase;
        opacity: 0.5;
        color: #000;
      }

      .cursor-wrapper {
        position: absolute;
        pointer-events: none;
        top: 0;
        left: 0;
        transform-origin: center;
        z-index: 2000;
        /*transition: all 200ms ease-in-out;*/
      }

      /* Collision wiggle animation */
      @keyframes wiggle {
        0% {
          transform: scale(1) rotate(0deg);
        }

        15% {
          transform: scale(1.4) rotate(-6deg);
        }

        30% {
          transform: scale(0.9) rotate(6deg);
        }

        45% {
          transform: scale(1.25) rotate(-4deg);
        }

        60% {
          transform: scale(0.95) rotate(3deg);
        }

        75% {
          transform: scale(1.1) rotate(-2deg);
        }

        100% {
          transform: scale(1) rotate(0deg);
        }
      }

      .wiggle {
        animation: wiggle 0.45s ease forwards;
      }

      #average-cursor {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        position: absolute;
        background-color: fuchsia;
        transform: translate(-50%, -50%);
        z-index: 3000;
      }

      /* Cursor styles */
      .cursor-circle {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background-color: yellow;
        transform: translate(-50%, -50%);
        transition:
          width 200ms ease-out,
          height 200ms ease-out;
      }

      /* Active/inactive state classes */
      .active-state .cursor-circle {
        background-color: orange !important;
      }

      /* Touch cursor styles */
      .touch-cursor {
        z-index: 5 !important;
        pointer-events: none;
      }

      .own-cursor.touch-active .cursor-circle {
        width: 200px;
        height: 200px;
      }

      /* Mobile-specific styles */
      @media (hover: none) and (pointer: coarse) {
        body {
          cursor: none !important;
        }
      }
    </style>
  </head>

  <body>
    <div id="hero"></div>

    <div id="average-cursor"></div>
    <div id="trigger-point"></div>

    <script src="/socket.io/socket.io.js"></script>

    <script>
      const socket = io();
      const soundFiles = ["sound1.wav", "sound2.wav", "sound3.wav"];
      const collisionPoolSize = 4;
      const soundPools = soundFiles.map((file) => {
        const src = `sound/${file}`;
        return Array.from({ length: collisionPoolSize }, () => {
          const audio = new Audio(src);
          audio.preload = "auto";
          return audio;
        });
      });
      const backgroundMusic = new Audio();
      const otherCursors = {};
      const averagePos = { x: 0, y: 0 };

      // My own identity (received from server)
      let myColor = null;
      let myBaseFreq = 220;
      let myBackgroundTrack = null;
      let myCursorEl = null;

      let averageCursorEl = document.getElementById("average-cursor");

      let myCursorLocal = {
        x: 0,
        y: 0,
        isTouching: false,
        isActive: false,
      };

      let activeTouchId = null;

      let lastUpdateTime = 0;
      let animationFrameId = null;

      let isMouseDown = false;

      // Audio
      let audioCtx = null;
      let myOsc = null;
      let myGain = null;
      let audioReady = false;

      // Throttle
      let lastEmit = 0;
      const collisionCooldownMs = 300;
      const collisionHitboxSize = 18;
      const collisionPadding = 10;
      const lastHitByCursor = {};

      // ─── Receive own identity from server ───────────────────────────
      socket.on("welcome", (data) => {
        myColor = data.color;
        myBaseFreq = data.freq;
        myBackgroundTrack = data.backgroundTrack;

        if (myBackgroundTrack) {
          backgroundMusic.src = `sound/${myBackgroundTrack}`;
          backgroundMusic.preload = "auto";
          backgroundMusic.load();
        }

        if (!myCursorEl) {
          myCursorEl = createCursorElement(myColor, false);
          myCursorEl.classList.add("own-cursor");
        }

        // Initialize at center position (50%)
        updateMyCursorPosition(window.innerWidth / 2, window.innerHeight / 2);
      });

      // ─── Game Loop ──────────────────────────────────────────────────
      function gameLoop(timestamp) {
        const deltaTime = timestamp - lastUpdateTime;
        lastUpdateTime = timestamp;

        // Calculate average position
        calculateAverage();

        // Check for collisions
        checkCollision();

        // Continue the loop
        animationFrameId = requestAnimationFrame(gameLoop);
      }

      // Start the game loop
      lastUpdateTime = performance.now();
      animationFrameId = requestAnimationFrame(gameLoop);

      // ─── Audio helpers ───────────────────────────────────────────────
      function modulateFreq(baseFreq, x, y) {
        return baseFreq;
      }

      function initializeAudio() {
        if (audioReady) return;
        // 激活 AudioContext 並預載所有音效
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioReady = true;

        if (myBackgroundTrack) {
          backgroundMusic.loop = true;
          backgroundMusic.volume = 0.25;
          backgroundMusic
            .play()
            .catch((e) => console.error("背景音樂播放失敗:", e));
        }
        soundPools.flat().forEach((sound) => {
          sound.currentTime = 0;
          sound.load();
        });

        const instructions = document.getElementById("instructions");
        if (instructions)
          instructions.innerText = "Sound enabled! Go bump into someone!";
      }

      // 支援電腦滑鼠點擊
      window.addEventListener("click", initializeAudio);
      
      // 支援手機觸摸 (iOS 和 Android)
      window.addEventListener("touchstart", initializeAudio, { passive: true });
      window.addEventListener("touchmove", initializeAudio, { passive: true });

      // ─── Collision effect ─────────────────────────────────────────────
      function triggerCollision(cursor) {
        // 1. 視覺效果：保持原本的 Wiggle 動畫
        if (!cursor?.el) return;
        cursor.el.classList.remove("wiggle");
        void cursor.el.offsetWidth;
        cursor.el.classList.add("wiggle");
        cursor.el.addEventListener(
          "animationend",
          () => {
            cursor.el.classList.remove("wiggle");
          },
          { once: true },
        );

        // 2. 隨機播放 MP3 音效
        if (audioReady && soundPools.length > 0) {
          // 從預載好的 pool 中挑一個可立即播放的音效實例，降低碰撞延遲
          const randomIndex = Math.floor(Math.random() * soundPools.length);
          const selectedPool = soundPools[randomIndex];
          const soundInstance =
            selectedPool.find((sound) => sound.paused || sound.ended) ||
            selectedPool[0];

          soundInstance.pause();
          soundInstance.currentTime = 0;
          soundInstance.volume = 0.6;
          soundInstance.play().catch((e) => console.error("音效播放失敗:", e));
        }
      }

      // ─── Build cursor DOM element ─────────────────────────────────────
      function createCursorElement(color, isTouch) {
        const cursor = document.createElement("div");
        cursor.classList.add("cursor-wrapper");
        if (isTouch) cursor.classList.add("touch-cursor");

        // Create a simple yellow circle (20px diameter)
        const circle = document.createElement("div");
        circle.classList.add("cursor-circle");

        cursor.appendChild(circle);
        document.body.appendChild(cursor);

        return cursor;
      }

      function isCollidingWithCursor(pointX, pointY, cursor) {
        if (!cursor?.el) return false;

        const left = cursor.x - collisionPadding;
        const top = cursor.y - collisionPadding;
        const right = cursor.x + cursor.el.offsetWidth + collisionPadding;
        const bottom = cursor.y + cursor.el.offsetHeight + collisionPadding;

        const halfHitbox = collisionHitboxSize / 2;
        const pointLeft = pointX - halfHitbox;
        const pointTop = pointY - halfHitbox;
        const pointRight = pointX + halfHitbox;
        const pointBottom = pointY + halfHitbox;

        return (
          pointLeft < right &&
          pointRight > left &&
          pointTop < bottom &&
          pointBottom > top
        );
      }

      function emitMyCursorState() {
        const now = Date.now();
        if (now - lastEmit < 16) return;
        lastEmit = now;

        socket.emit("cursor-move", {
          x: myCursorLocal.x,
          y: myCursorLocal.y,
          isTouching: myCursorLocal.isTouching,
          isActive: myCursorLocal.isActive,
        });
      }

      function updateMyCursorPosition(x, y) {
        // Convert absolute positions to percentages
        const screenWidth = window.innerWidth;
        const screenHeight = window.innerHeight;
        const xPercent = (x / screenWidth) * 100;
        const yPercent = (y / screenHeight) * 100;

        myCursorLocal.x = xPercent;
        myCursorLocal.y = yPercent;
        emitMyCursorState();
        myCursorEl.style.left = x + "px";
        myCursorEl.style.top = y + "px";

        // Modulate my own sound with position
        if (audioCtx && myOsc) {
          const modFreq = modulateFreq(
            myBaseFreq,
            myCursorLocal.x,
            myCursorLocal.y,
          );
          myOsc.frequency.setTargetAtTime(modFreq, audioCtx.currentTime, 0.08);
        }
      }

      // ─── Mouse tracking ───────────────────────────────────────────────
      window.addEventListener("mousedown", () => {
        isMouseDown = true;
        console.log("Mouse down - active state");
        if (myCursorEl) {
          myCursorEl.classList.add("active-state");
        }
        myCursorLocal.isActive = true;
        emitMyCursorState();
      });

      window.addEventListener("mouseup", () => {
        isMouseDown = false;
        console.log("Mouse up - inactive state");
        if (myCursorEl) {
          myCursorEl.classList.remove("active-state");
        }
        myCursorLocal.isActive = false;
        emitMyCursorState();
      });

      window.addEventListener("mousemove", (e) => {
        updateMyCursorPosition(
          e.clientX + window.scrollX,
          e.clientY + window.scrollY,
        );
      });

      // ─── Touch tracking for mobile devices ────────────────────────────
      function handleTouchStart(e) {
        console.log("Touch start detected, touches:", e.touches.length);
        if (e.touches.length === 1 && !activeTouchId) {
          const touch = e.touches[0];
          activeTouchId = touch.identifier;
          myCursorLocal.isTouching = true;

          console.log("Starting touch with ID:", activeTouchId);

          if (myCursorEl) {
            myCursorEl.classList.add("touch-active");
            myCursorEl.classList.add("active-state");
          }

          // Prevent default to avoid scrolling
          // e.preventDefault();

          updateMyCursorPosition(
            e.clientX + touch.clientX,
            e.clientY + touch.clientY,
          );
        }
      }

      function handleTouchMove(e) {
        if (!activeTouchId) return;

        const touch = Array.from(e.touches).find(
          (t) => t.identifier === activeTouchId,
        );
        if (touch) {
          // e.preventDefault(); // Prevent scrolling
          updateMyCursorPosition(touch.clientX, touch.clientY);
        }
      }

      function handleTouchEnd(e) {
        if (activeTouchId) {
          const touch = Array.from(e.changedTouches).find(
            (t) => t.identifier === activeTouchId,
          );
          if (touch) {
            myBackgroundTrack = false;
            activeTouchId = null;
            myCursorLocal.isTouching = false;

            if (myCursorEl) {
              myCursorEl.classList.remove("touch-active");
              myCursorEl.classList.remove("active-state");
            }
            emitMyCursorState();
          }
        }
      }

      // Add touch event listeners with passive: false to allow preventDefault
      window.addEventListener("touchstart", handleTouchStart, {
        passive: false,
      });
      window.addEventListener("touchmove", handleTouchMove, { passive: false });
      window.addEventListener("touchend", handleTouchEnd, { passive: false });
      window.addEventListener("touchcancel", handleTouchEnd, {
        passive: false,
      });

      // ─── Receive other cursors ────────────────────────────────────────
      socket.on("cursor-update", (data) => {
        // console.log(
        //   "Received cursor update with touch state:",
        //   data.isTouching,
        // );

        // First time seeing this user
        if (!otherCursors[data.id]) {
          const el = createCursorElement(data.color, data.isTouching);
          const entry = {
            el,
            x: 0,
            y: 0,
            baseFreq: data.freq,
            osc: null,
            gain: null,
            isTouching: false,
            isActive: false,
          };

          otherCursors[data.id] = entry;
        }

        const c = otherCursors[data.id];
        // Convert percentage positions back to absolute positions
        const screenWidth = window.innerWidth;
        const screenHeight = window.innerHeight;
        c.x = (data.x / 100) * screenWidth;
        c.y = (data.y / 100) * screenHeight;
        c.isTouching = data.isTouching || false;
        c.isActive = data.isActive || false;
        c.el.style.left = c.x + "px";
        c.el.style.top = c.y + "px";

        // Update cursor classes based on active state
        const circle = c.el.querySelector(".cursor-circle");
        if (circle) {
          if (c.isActive || c.isTouching) {
            c.el.classList.add("active-state");
          } else {
            c.el.classList.remove("active-state");
          }
        }

        // Add visual indicator for touch state
        if (c.isTouching) {
          c.el.classList.add("touch-active");
          c.el.style.display = "block";
        } else {
          c.el.classList.remove("touch-active");
        }

        // Modulate their sound with their position
        if (audioCtx && c.osc) {
          const modFreq = modulateFreq(c.baseFreq, c.x, c.y);
          c.osc.frequency.setTargetAtTime(modFreq, audioCtx.currentTime, 0.08);
        }
      });

      function calculateAverage() {
        // Convert our own percentage position to absolute for calculation
        const screenWidth = window.innerWidth;
        const screenHeight = window.innerHeight;
        const myX = (myCursorLocal.x / 100) * screenWidth;
        const myY = (myCursorLocal.y / 100) * screenHeight;

        let xSum = myX;
        let ySum = myY;
        let activeCursorCount = 1; // Start with 1 for our own cursor

        const otherCursorsArray = Object.values(otherCursors);
        otherCursorsArray.forEach((cursor) => {
          // Only include cursors that are actively touching (for touch devices)
          // or always include non-touch cursors
          if (
            !cursor.el.classList.contains("touch-cursor") ||
            cursor.isTouching
          ) {
            xSum += cursor.x;
            ySum += cursor.y;
            activeCursorCount++;
          }
        });

        if (activeCursorCount > 0) {
          averagePos.x = xSum / activeCursorCount;
          averagePos.y = ySum / activeCursorCount;
          averageCursorEl.style.left = averagePos.x + "px";
          averageCursorEl.style.top = averagePos.y + "px";
        }
      }

      // ─── Collision detection ──────────────────────────────────────────
      function checkCollision() {
        const now = Date.now();

        // Convert our own percentage position to absolute for collision detection
        const screenWidth = window.innerWidth;
        const screenHeight = window.innerHeight;
        const myX = (myCursorLocal.x / 100) * screenWidth;
        const myY = (myCursorLocal.y / 100) * screenHeight;

        for (const id in otherCursors) {
          const other = otherCursors[id];
          const lastHit = lastHitByCursor[id] || 0;
          if (now - lastHit < collisionCooldownMs) continue;

          if (isCollidingWithCursor(myX, myY, other)) {
            lastHitByCursor[id] = now;
            triggerCollision({ el: myCursorEl });
            triggerCollision(other);
          }
        }
      }

      // ─── User leaves ──────────────────────────────────────────────────
      socket.on("user-left", (id) => {
        if (otherCursors[id]) {
          // Fade out their sound before removing
          if (audioCtx && otherCursors[id].gain) {
            const g = otherCursors[id].gain;
            g.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
            // Stop oscillator after fade
            setTimeout(() => {
              try {
                otherCursors[id].osc.stop();
              } catch (e) {}
            }, 500);
          }
          otherCursors[id].el.remove();
          delete otherCursors[id];
          delete lastHitByCursor[id];
        }
      });

      // Cleanup on page unload
      window.addEventListener("beforeunload", () => {
        if (animationFrameId) {
          cancelAnimationFrame(animationFrameId);
        }
      });
    </script>
  </body>
</html>
