<!DOCTYPE html>
<html>

<head>
    <title>Test</title>
    <style>
        .cursor {
            position: absolute;
            width: 15px;
            height: 15px;
            background: blue;
            border-radius: 50%;
            pointer-events: none;
            /* 讓滑鼠點擊不會被這個 div 擋住 */
        }
    </style>
</head>

<body>
    <h1>Test</h1>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const otherCursors = {};
        const myPosition = { x: 0, y: 0 };
        let audioCtx = null;

        // 1. 初始化音效環境（必須由使用者點擊觸發）
        window.addEventListener('click', () => {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                document.getElementById('instructions').innerText = "音效已啟動！去撞別人的游標吧！";
            }
        });

        // 2. 播放碰撞合成音
        function playHitSound() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); // 高音嗶聲
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // 3. 監聽滑鼠移動
        window.addEventListener('mousemove', (e) => {
            myPosition.x = e.clientX;
            myPosition.y = e.clientY;
            socket.emit('cursor-move', { x: myPosition.x, y: myPosition.y });
            checkCollision();
        });

        // 4. 接收他人座標
        socket.on('cursor-update', (data) => {
            if (!otherCursors[data.id]) {
                const div = document.createElement('div');
                div.className = 'cursor';
                div.style.backgroundColor = data.color;
                document.body.appendChild(div);
                otherCursors[data.id] = { el: div, x: 0, y: 0 };
            }
            const c = otherCursors[data.id];
            c.x = data.x;
            c.y = data.y;
            c.el.style.left = c.x + 'px';
            c.el.style.top = c.y + 'px';
            checkCollision();
        });

        // 5. 核心：碰撞偵測邏輯
        function checkCollision() {
            for (let id in otherCursors) {
                const other = otherCursors[id];
                const dx = myPosition.x - other.x;
                const dy = myPosition.y - other.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                // 如果距離小於 20 像素，觸發音效
                if (distance < 20) {
                    playHitSound();
                }
            }
        }

        socket.on('user-left', (id) => {
            if (otherCursors[id]) {
                otherCursors[id].el.remove();
                delete otherCursors[id];
            }
        });


    </script>
</body>

</html>
