<!doctype html>
<html>
  <head>
    <title>Cursor Party</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap"
      rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: #fff;
      }

      #hero {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 16px;
        pointer-events: none;
      }

      h1 {
        font-size: 48px;
        font-weight: 300;
        letter-spacing: 6px;
        text-transform: uppercase;
        opacity: 0.5;
        color: #000;
      }

      #instructions {
        font-size: 14px;
        font-weight: 400;
        letter-spacing: 1px;
        opacity: 0.5;
        color: #000;
      }

      .cursor-wrapper {
        position: absolute;
        pointer-events: none;
        top: 0;
        left: 0;
      }

      .cursor-wrapper svg {
        display: block;
      }

      .cursor-label {
        margin-top: 2px;
        margin-left: 4px;
        font-size: 11px;
        font-weight: 400;
        letter-spacing: 0.3px;
        white-space: nowrap;
        padding: 2px 6px;
        border-radius: 4px;
        background: rgba(0, 0, 0, 0.08);
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div id="hero">
      <h1>Cursor Party</h1>
      <p id="instructions">
        Click anywhere to enable sound — then go bump into someone!
      </p>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const otherCursors = {};
      const myPosition = { x: 0, y: 0 };
      let audioCtx = null;
      let lastHit = 0;
      let lastEmit = 0;

      // Creates a cursor arrow + name tag for a user
      function createCursorElement(color, name) {
        const wrapper = document.createElement("div");
        wrapper.classList.add("cursor-wrapper");

        // SVG arrow
        const svg = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "svg",
        );
        svg.setAttribute("viewBox", "0 0 24 24");
        svg.setAttribute("width", "24");
        svg.setAttribute("height", "24");

        const path = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "path",
        );
        path.setAttribute(
          "d",
          "M4 2 L4 18 L8 14 L12 22 L14 21 L10 13 L16 13 Z",
        );
        path.setAttribute("fill", color);
        path.setAttribute("stroke", "white");
        path.setAttribute("stroke-width", "1.2");
        path.setAttribute("stroke-linejoin", "round");
        svg.appendChild(path);

        // Name tag
        const label = document.createElement("span");
        label.classList.add("cursor-label");
        label.style.color = color;
        label.innerText = name;

        wrapper.appendChild(svg);
        wrapper.appendChild(label);
        document.body.appendChild(wrapper);

        return wrapper;
      }

      // 1. Initialize audio (must be triggered by user click)
      window.addEventListener("click", () => {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          document.getElementById("instructions").innerText =
            "Sound enabled! Go bump into someone!";
        }
      });

      // 2. Play collision sound
      function playHitSound() {
        if (!audioCtx || audioCtx.state === "suspended") return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = "sine";
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(
          0.01,
          audioCtx.currentTime + 0.1,
        );
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
      }

      // 3. Track mouse movement
      window.addEventListener("mousemove", (e) => {
        const now = Date.now();
        if (now - lastEmit < 16) return;
        lastEmit = now;

        myPosition.x = e.clientX + window.scrollX;
        myPosition.y = e.clientY + window.scrollY;

        socket.emit("cursor-move", { x: myPosition.x, y: myPosition.y });
        checkCollision();
      });

      // 4. Receive other cursors
      socket.on("cursor-update", (data) => {
        if (!otherCursors[data.id]) {
          const el = createCursorElement(data.color, data.name);
          otherCursors[data.id] = { el, x: 0, y: 0 };
        }

        const c = otherCursors[data.id];
        c.x = data.x;
        c.y = data.y;
        c.el.style.left = c.x + "px";
        c.el.style.top = c.y + "px";
        checkCollision();
      });

      // 5. Collision detection with 300ms cooldown
      function checkCollision() {
        const now = Date.now();
        if (now - lastHit < 300) return;

        for (let id in otherCursors) {
          const other = otherCursors[id];
          const dx = myPosition.x - other.x;
          const dy = myPosition.y - other.y;
          const distance = Math.sqrt(dx * dx + dy * dy);

          if (distance < 20) {
            playHitSound();
            lastHit = now;
            break;
          }
        }
      }

      // 6. Remove cursor when someone leaves
      socket.on("user-left", (id) => {
        if (otherCursors[id]) {
          otherCursors[id].el.remove();
          delete otherCursors[id];
        }
      });
    </script>
  </body>
</html>
