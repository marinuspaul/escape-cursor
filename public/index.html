<!doctype html>
<html>
  <head>
    <title>DANCE PARTY</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        cursor: none !important;
      }

      html,
      body {
        font-family: sans-serif;
        background: #000;
        color: white;
        cursor: none;
        overflow: hidden;
        margin: 0;
        padding: 0;
      }

      #hero {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        gap: 16px;
        pointer-events: none;
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin: 0;
        font-size: 1rem;

        p {
          max-width: 80%;
          text-align: center;
        }
      }

      .cursor-wrapper {
        position: absolute;
        pointer-events: none;
        top: 0;
        left: 0;
        transform-origin: center;
        z-index: 2000;
        transition: transform 200ms ease-out;
      }

      /* Collision wiggle animation */
      @keyframes wiggle {
        0% {
          transform: scale(1) rotate(0deg);
        }

        15% {
          transform: scale(1.4) rotate(-6deg);
        }

        30% {
          transform: scale(0.9) rotate(6deg);
        }

        45% {
          transform: scale(1.25) rotate(-4deg);
        }

        60% {
          transform: scale(0.95) rotate(3deg);
        }

        75% {
          transform: scale(1.1) rotate(-2deg);
        }

        100% {
          transform: scale(1) rotate(0deg);
        }
      }

      .wiggle {
        animation: wiggle 0.45s ease forwards;
      }

      /* Cursor styles */
      .cursor-circle {
        border-radius: 50%;
        background-color: yellow;
        transform: translate(-50%, -50%);
        transition:
          width 200ms ease-out,
          height 200ms ease-out;
      }

      /* Active/inactive state classes */
      .active-state .cursor-circle {
        background-color: orange !important;
      }

      /* Touch cursor styles */
      .touch-cursor {
        z-index: 5 !important;
        pointer-events: none;
      }

      .own-cursor.touch-active {
        transform: scale(5);
      }

      /* Mobile-specific styles */
      @media (hover: none) and (pointer: coarse) {
        body {
          cursor: none !important;
        }
      }
    </style>
  </head>

  <body>
    <div id="hero">
      <p>Drag on screen to move.</p>
      <p>Look at the projection and dance together!</p>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/shapes.js"></script>

    <script>
      const socket = io();
      const soundFiles = [
        "piano-1.mp3",
        "piano-2.mp3",
        "piano-3.mp3",
        "piano-4.mp3",
        "piano-5.mp3",
        "piano-6.mp3",
        "piano-7.mp3",
        "piano-8.mp3",
      ];
      const collisionPoolSize = 4;
      const soundPools = soundFiles.map((file) => {
        const src = `sound/${file}`;
        return Array.from({ length: collisionPoolSize }, () => {
          const audio = new Audio(src);
          audio.preload = "auto";
          return audio;
        });
      });
      const backgroundMusic = new Audio();
      const otherCursors = {};
      const averagePos = { x: 0, y: 0 };

      // My own cursor state - unified object
      let myCursor = {
        color: null,
        shape: null,
        baseFreq: 220,
        backgroundTrack: null,
        x: 0,
        y: 0,
        isTouching: false,
        isActive: false,
      };

      let myCursorEl = null;
      let averageCursorEl = document.getElementById("average-cursor");
      let activeTouchId = null;
      let lastUpdateTime = 0;
      let animationFrameId = null;

      // Audio
      let audioCtx = null;
      let myOsc = null;
      let myGain = null;
      let audioReady = false;

      // Throttle
      let lastEmit = 0;
      const collisionCooldownMs = 300;
      const collisionHitboxSize = 18;
      const collisionPadding = 10;
      const lastHitByCursor = {};

      // ─── Receive own identity from server ───────────────────────────
      socket.on("welcome", (data) => {
        console.log(data);
        myCursor.color = data.color;
        myCursor.shape = data.shape;
        myCursor.baseFreq = data.freq;
        myCursor.backgroundTrack = data.backgroundTrack;

        if (myCursor.backgroundTrack) {
          backgroundMusic.src = `sound/${myCursor.backgroundTrack}`;
          backgroundMusic.preload = "auto";
          backgroundMusic.load();
        }

        if (!myCursorEl) {
          myCursorEl = createCursorElement(
            myCursor.color,
            myCursor.shape,
            false,
          );
          myCursorEl.classList.add("own-cursor");
        }

        // Initialize at center position (50%)
        updateMyCursorPosition(window.innerWidth / 2, window.innerHeight / 2);
      });

      // ─── Game Loop ──────────────────────────────────────────────────
      function gameLoop(timestamp) {
        const deltaTime = timestamp - lastUpdateTime;
        lastUpdateTime = timestamp;

        // Calculate average position
        // calculateAverage();

        // Check for collisions
        // checkCollision();

        // Continue the loop
        animationFrameId = requestAnimationFrame(gameLoop);
      }

      // Start the game loop
      lastUpdateTime = performance.now();
      animationFrameId = requestAnimationFrame(gameLoop);

      // ─── Audio helpers ───────────────────────────────────────────────
      function modulateFreq(baseFreq, x, y) {
        return baseFreq;
      }

      function initializeAudio() {
        if (audioReady) return;
        // 激活 AudioContext 並預載所有音效
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioReady = true;

        // if (myBackgroundTrack) {
        //   backgroundMusic.loop = true;
        //   backgroundMusic.volume = 0.25;
        //   backgroundMusic
        //     .play()
        //     .catch((e) => console.error("背景音樂播放失敗:", e));
        // }
        soundPools.flat().forEach((sound) => {
          sound.currentTime = 0;
          sound.load();
        });

        const instructions = document.getElementById("instructions");
        if (instructions)
          instructions.innerText = "Sound enabled! Go bump into someone!";
      }

      // 支援電腦滑鼠點擊
      window.addEventListener("click", initializeAudio);

      // 支援手機觸摸 (iOS 和 Android)
      window.addEventListener("touchstart", initializeAudio, { passive: true });
      window.addEventListener("touchmove", initializeAudio, { passive: true });

      // ─── Build cursor DOM element ─────────────────────────────────────
      function createCursorElement(color, shape, isTouch) {
        const cursor = document.createElement("div");
        cursor.classList.add("cursor-wrapper");
        if (isTouch) cursor.classList.add("touch-cursor");

        // Get the SVG shape
        const shapeData = getShapeById(shape);
        if (shapeData) {
          const svgContainer = document.createElement("div");
          svgContainer.classList.add("cursor-shape");
          svgContainer.innerHTML = shapeData.svg;

          // Apply color to the SVG
          const svg = svgContainer.querySelector("svg");
          if (svg) {
            svg.style.color = color;
            svg.style.width = "20px";
            svg.style.height = "20px";
          }

          cursor.appendChild(svgContainer);
        }

        document.body.appendChild(cursor);

        return cursor;
      }

      function emitMyCursorState() {
        const now = Date.now();
        if (now - lastEmit < 16) return;
        lastEmit = now;

        socket.emit("cursor-move", {
          x: myCursor.x,
          y: myCursor.y,
          isTouching: myCursor.isTouching,
          isActive: myCursor.isActive,
        });
      }

      function updateMyCursorPosition(x, y) {
        // Convert absolute positions to percentages
        const screenWidth = window.innerWidth;
        const screenHeight = window.innerHeight;
        x = clamp(x, 0, screenWidth);
        y = clamp(y, 0, screenHeight);
        let xPercent = (x / screenWidth) * 100;
        let yPercent = (y / screenHeight) * 100;

        myCursor.x = xPercent;
        myCursor.y = yPercent;
        emitMyCursorState();
        myCursorEl.style.left = x + "px";
        myCursorEl.style.top = y + "px";

        // Modulate my own sound with position
        if (audioCtx && myOsc) {
          const modFreq = modulateFreq(
            myCursor.baseFreq,
            myCursor.x,
            myCursor.y,
          );
          myOsc.frequency.setTargetAtTime(modFreq, audioCtx.currentTime, 0.08);
        }
      }

      function clamp(num, a, b) {
        return Math.max(Math.min(num, Math.max(a, b)), Math.min(a, b));
      }

      // ─── Mouse tracking ───────────────────────────────────────────────
      window.addEventListener("mousedown", () => {
        console.log("Mouse down - active state");
        if (myCursorEl) {
          myCursorEl.classList.add("active-state");
        }
        myCursor.isActive = true;
        emitMyCursorState();
      });

      window.addEventListener("mouseup", () => {
        console.log("Mouse up - inactive state");
        if (myCursorEl) {
          myCursorEl.classList.remove("active-state");
        }
        myCursor.isActive = false;
        emitMyCursorState();
      });

      window.addEventListener("mousemove", (e) => {
        updateMyCursorPosition(
          e.clientX + window.scrollX,
          e.clientY + window.scrollY,
        );
      });

      // ─── Touch tracking for mobile devices ────────────────────────────
      function handleTouchStart(e) {
        console.log("Touch start detected, touches:", e.touches.length);
        if (e.touches.length === 1 && !activeTouchId) {
          const touch = e.touches[0];
          activeTouchId = touch.identifier;
          myCursor.isTouching = true;

          console.log("Starting touch with ID:", activeTouchId);

          if (myCursorEl) {
            myCursorEl.classList.add("touch-active");
            myCursorEl.classList.add("active-state");
          }

          // Prevent default to avoid scrolling
          e.preventDefault();

          updateMyCursorPosition(touch.clientX, touch.clientY);
        }
      }

      function handleTouchMove(e) {
        if (!activeTouchId) return;

        const touch = Array.from(e.touches).find(
          (t) => t.identifier === activeTouchId,
        );
        if (touch) {
          e.preventDefault(); // Prevent scrolling
          updateMyCursorPosition(touch.clientX, touch.clientY);
        }
      }

      function handleTouchEnd(e) {
        if (activeTouchId) {
          const touch = Array.from(e.changedTouches).find(
            (t) => t.identifier === activeTouchId,
          );
          if (touch) {
            activeTouchId = null;
            myCursor.isTouching = false;

            if (myCursorEl) {
              myCursorEl.classList.remove("touch-active");
              myCursorEl.classList.remove("active-state");
            }
            emitMyCursorState();
          }
        }
      }

      // Add touch event listeners with passive: false to allow preventDefault
      window.addEventListener("touchstart", handleTouchStart, {
        passive: false,
      });
      window.addEventListener("touchmove", handleTouchMove, { passive: false });
      window.addEventListener("touchend", handleTouchEnd, { passive: false });
      window.addEventListener("touchcancel", handleTouchEnd, {
        passive: false,
      });

      // Cleanup on page unload
      window.addEventListener("beforeunload", () => {
        if (animationFrameId) {
          cancelAnimationFrame(animationFrameId);
        }
      });
    </script>
  </body>
</html>
